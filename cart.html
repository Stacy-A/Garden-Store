<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    

 
  <link rel="stylesheet" href="styles.css" />

</head>

<body>

    <section class="site-header">
    
    </section>

    <section class="hero cart-hero">
        <div class="banner inner-section">
            <h1 class="heading">Cart</h1>
        </div>  
    
    </section>

    <section>
     <div class="inner-section cart-inner-section">
            

        <div class="cart-list" id="cart-list">
       
            <h4>Products in Cart</h4>
            <p id="empty-cart-msg">Your cart is empty</p>
            <div class="grid" id="cart-grid">
            </div>  
        </div>

        <div class="cart-totals">
            <div class="total-price">
                <p class="price-header">Total Price</p>
                <div class="price">

                </div> 
                <button id="checkout">Place Order</button> 
            </div>
           
        </div>   
    </div>
    </section>

    <div id="checkout-popup">
            <div class="popup-inner">
                <h2>Thanks for your order</h2>
                <p id="popup-message"></p>
                <button id="popup-close">Close</button>
            </div>
    </div>

     <footer> 
        

    </footer> 

    <script src="cart.js" defer></script>
    <script src="global.js" defer></script>


    </body>
